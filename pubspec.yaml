name: verticalpartswms
description: "WMS VerticalParts Mobile — conectado ao Supabase"
publish_to: "none"
version: 2.0.1+3

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.0
  sizer: ^2.0.15
  provider: ^6.1.5+1
  supabase_flutter: ^2.5.6
  connectivity_plus: ^6.0.3
  mobile_scanner: ^5.1.1
  permission_handler: ^11.3.1
  sqflite: ^2.3.3
  shared_preferences: ^2.2.3
  flutter_dotenv: ^5.1.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - img/
    - .env
