version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: 6.2.0
  sizer: ^2.0.15
  connectivity_plus: ^6.0.3
